name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'meta-method-216117' }}
  REGION: us-central1
  SERVICE_NAME: supervised-ml-pipeline

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push container image
        run: |
          BUILD_OUTPUT=$(gcloud builds submit \
            --project "$PROJECT_ID" \
            --tag "gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA" \
            --timeout=1200s \
            --async . 2>&1)

          echo "$BUILD_OUTPUT"

          BUILD_ID=$(printf '%s\n' "$BUILD_OUTPUT" | sed -n 's|.*builds/\([A-Za-z0-9-]*\).*|\1|p' | head -1)

          if [ -z "$BUILD_ID" ]; then
            echo "Unable to determine Cloud Build ID from gcloud output"
            exit 1
          fi

          echo "Started Cloud Build: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "$PROJECT_ID" \
              --format='value(status)')

            echo "Cloud Build status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              break
            fi

            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || \
               [ "$STATUS" = "TIMEOUT" ]  || [ "$STATUS" = "CANCELLED" ]      || \
               [ "$STATUS" = "EXPIRED" ]; then
              gcloud builds describe "$BUILD_ID" \
                --project "$PROJECT_ID" \
                --format='yaml(status,logUrl,results,images)'
              exit 1
            fi

            sleep 15
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2 \
            --max-instances 2 \
            --timeout 300

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"
